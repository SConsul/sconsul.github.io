---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.fulltitle }}</h1>
    <h4 class="post-description">{{ page.fulldescription }}</h5>
    <h5 class="post-description">{{ page.team }}</h5>	
  </header>

  <article class="post-content {{page.title}} clearfix">
    {{ content }}
  </article>

  {% if page.news %}
    {% include news.html %}
  {% endif %}

  {% if page.social %}
    {% include social.html %}
  {% endif %}

</div>
